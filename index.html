<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Portal - Sandip University</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="vertical-strip">
        <div class="strip-text">ENQUIRE NOW</div>
        <div class="strip-divider"></div>
        <div class="strip-text">ADMISSIONS 2026-27</div>
    </div>

    <div class="floating-widgets">
        <div class="float-icon lion-border">
            <img src="https://app-upload-assets.cdn.botstar.com/786863f0-8ad0-11eb-8b55-1509c609cd85/image/1622406079262/transparent%20w%20circle.png" alt="Lion">
        </div>
        <div class="float-icon whatsapp-bg">
            <img src="https://cdn-icons-png.flaticon.com/128/3670/3670051.png" alt="WhatsApp">
        </div>
    </div>

    <div class="top-bar">
        <div class="social-icons">
            <a href="#"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="far fa-compass"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <header class="main-header">
        <div class="header-content">
            <img src="https://www.sandipuniversity.edu.in/images/logo-dark.png" alt="University Logo" class="uni-logo">
            <div class="menu-icon">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div class="box">
            <h2>Results</h2>
            <div class="exam-info">
                <h3>End Semester Examination- MAY 2025</h3>
            </div>
            
            <div class="form-container">
                <label for="prn">PRN:</label>
                <input type="text" id="prn" placeholder="Enter PRN">

                <label for="dob">Date Of Birth</label>
                <span class="dob-format">dd-mm-yyyy:</span>
                <input type="date" id="dob">

                <button onclick="checkResult()" class="submit-btn">Submit</button>

                <div id="result-wrapper" class="hidden">
                    <div class="divider"></div>
                    <embed id="marksheet-pdf" src="" type="application/pdf" width="100%" height="600px">
                    <div class="btn-row">
                        <button class="down-btn">Down</button>
                    </div>
                    <div id="popup" class="popup hidden">
                        <i class="fab fa-whatsapp"></i>
                        Result has been sent to parents WhatsApp number. Kindly check.
                    </div>
                    <div class="disclaimer">
                        <strong>Disclaimer:</strong> The results published online are provisional.
                    </div>
                </div>
            </div>
            <p id="msg"></p>
        </div>
    </div>

    <footer class="action-footer">
        <div class="footer-btn"><i class="fas fa-arrow-up"></i> ENQUIRE NOW</div>
        <div class="footer-btn"><i class="fas fa-phone-alt"></i> CALL NOW</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
